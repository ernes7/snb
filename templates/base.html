<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Torneo MVP Cuba 2011{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <a href="#main" class="skip-link">Saltar al contenido</a>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <svg class="sidebar-logo" viewBox="0 0 32 32" fill="none">
                <circle cx="16" cy="16" r="14" stroke="white" stroke-width="2"/>
                <path d="M6 16 C6 10, 16 4, 26 16 C26 22, 16 28, 6 16Z" stroke="white" stroke-width="1.5" fill="none"/>
                <path d="M16 2 C14 10, 14 22, 16 30" stroke="white" stroke-width="1" fill="none"/>
            </svg>
            <span class="sidebar-title">Serie Nacional</span>
        </div>
        <nav class="sidebar-nav" role="navigation" aria-label="Navegacion principal">
            <a href="{{ url_for('main.index') }}" {% if request.endpoint == 'main.index' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Clasificacion</span>
            </a>
            <a href="{{ url_for('schedule.schedule') }}" {% if request.endpoint == 'schedule.schedule' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Calendario</span>
            </a>
            <a href="{{ url_for('leaders.leaders') }}" {% if request.endpoint == 'leaders.leaders' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>Lideres</span>
            </a>
            <a href="{{ url_for('players.all_players') }}" {% if request.endpoint == 'players.all_players' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Jugadores</span>
            </a>
            <a href="{{ url_for('draft.draft') }}" {% if request.endpoint == 'draft.draft' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>Draft</span>
            </a>
            <a href="{{ url_for('playoffs.playoffs') }}" {% if request.endpoint == 'playoffs.playoffs' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span>Playoffs</span>
            </a>
            <a href="{{ url_for('antesala.antesala') }}" {% if request.endpoint == 'antesala.antesala' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>Antesala</span>
            </a>
            <a href="{{ url_for('weekly.weekly') }}" {% if request.endpoint == 'weekly.weekly' %}class="active"{% endif %}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>Semanal</span>
            </a>
        </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content" id="main">
        <header class="topbar-mobile">
            <button class="hamburger" id="sidebar-toggle" aria-label="Abrir menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="topbar-title">Serie Nacional</span>
        </header>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <nav class="bottom-tabs" role="navigation" aria-label="Navegacion rapida">
        <a href="{{ url_for('main.index') }}" {% if request.endpoint == 'main.index' %}class="active"{% endif %}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Inicio
        </a>
        <a href="{{ url_for('schedule.schedule') }}" {% if request.endpoint == 'schedule.schedule' %}class="active"{% endif %}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Calendario
        </a>
        <a href="{{ url_for('leaders.leaders') }}" {% if request.endpoint == 'leaders.leaders' %}class="active"{% endif %}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Lideres
        </a>
        <a href="{{ url_for('players.all_players') }}" {% if request.endpoint == 'players.all_players' %}class="active"{% endif %}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            Jugadores
        </a>
        <a href="{{ url_for('weekly.weekly') }}" {% if request.endpoint == 'weekly.weekly' %}class="active"{% endif %}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Semanal
        </a>
    </nav>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
