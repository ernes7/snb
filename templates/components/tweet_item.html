{# Analyst tweet/comment display #}
{% macro tweet_item(handle, texto, avatar_file=None, emoji=None) %}
<div class="tweet">
    <div class="tweet-header">
        {% if avatar_file %}
        <img src="{{ url_for('static', filename='graphics/' + avatar_file) }}" class="tweet-avatar" alt="{{ handle }}">
        {% elif emoji %}
        <span class="tweet-emoji">{{ emoji }}</span>
        {% endif %}
        <strong>{{ handle }}</strong>
        <span class="tweet-handle">@{{ handle }}</span>
    </div>
    <div class="tweet-text">{{ texto }}</div>
</div>
{% endmacro %}
