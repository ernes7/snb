{# Game score display with winner coloring #}
{% macro game_score(home_runs, away_runs, home_color, away_color) %}
<span class="game-score {% if home_runs > away_runs %}team-color{% endif %}" {% if home_runs > away_runs %}style="--team-color: {{ home_color }}"{% endif %}>{{ home_runs }}</span>
<span class="score-dash">&mdash;</span>
<span class="game-score {% if away_runs > home_runs %}team-color{% endif %}" {% if away_runs > home_runs %}style="--team-color: {{ away_color }}"{% endif %}>{{ away_runs }}</span>
{% endmacro %}
