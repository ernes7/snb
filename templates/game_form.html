{% extends "base.html" %}
{% block title %}{{ 'Editar' if game else 'Registrar' }} Juego #{{ sched.game_num }}{% endblock %}
{% block content %}
<h1>
    Juego #{{ sched.game_num }}:
    <span style="color: {{ sched.home_color }}">{{ sched.home_name }}</span>
    vs
    <span style="color: {{ sched.away_color }}">{{ sched.away_name }}</span>
</h1>

<form method="POST" action="{{ url_for('games.game_save') }}">
    <input type="hidden" name="schedule_id" value="{{ sched.id }}">

    <div class="card">
        <h2 style="margin-top:0">Marcador</h2>
        <div class="form-grid">
            <div class="field">
                <label>Carreras <strong style="color: {{ sched.home_color }}">{{ sched.home_short }}</strong> (Local)</label>
                <input type="number" name="home_runs" id="home_runs" min="0" value="{{ game.home_runs if game else '' }}" required>
            </div>
            <div class="field">
                <label>Carreras <strong style="color: {{ sched.away_color }}">{{ sched.away_short }}</strong> (Visitante)</label>
                <input type="number" name="away_runs" id="away_runs" min="0" value="{{ game.away_runs if game else '' }}" required>
            </div>
            <div class="field">
                <label>Hits {{ sched.home_short }}</label>
                <input type="number" name="home_hits" min="0" value="{{ game.home_hits if game else '' }}">
            </div>
            <div class="field">
                <label>Hits {{ sched.away_short }}</label>
                <input type="number" name="away_hits" min="0" value="{{ game.away_hits if game else '' }}">
            </div>
            <div class="field">
                <label>Errores {{ sched.home_short }}</label>
                <input type="number" name="home_errors" min="0" value="{{ game.home_errors if game else '' }}">
            </div>
            <div class="field">
                <label>Errores {{ sched.away_short }}</label>
                <input type="number" name="away_errors" min="0" value="{{ game.away_errors if game else '' }}">
            </div>
        </div>
    </div>

    <div class="card">
        <h2 style="margin-top:0">Pitchers</h2>
        <div id="pitcher-hint" style="display:none; margin-bottom: 0.8rem; padding: 0.5rem 0.8rem; background: var(--bg-alt); border-radius: 6px; font-size: 0.82rem; color: var(--muted);"></div>
        <div class="form-row-3">
            <div class="field">
                <label>Pitcher Ganador</label>
                <select name="winning_pitcher_id" id="winning_pitcher_id">
                    <option value="">— Seleccionar —</option>
                    <optgroup label="{{ sched.home_name }}">
                        {% for p in home_pitchers %}
                        <option value="{{ p.id }}" data-team="home" {{ 'selected' if game and game.winning_pitcher_id == p.id else '' }}>{{ p.name }}</option>
                        {% endfor %}
                    </optgroup>
                    <optgroup label="{{ sched.away_name }}">
                        {% for p in away_pitchers %}
                        <option value="{{ p.id }}" data-team="away" {{ 'selected' if game and game.winning_pitcher_id == p.id else '' }}>{{ p.name }}</option>
                        {% endfor %}
                    </optgroup>
                </select>
            </div>
            <div class="field">
                <label>Pitcher Perdedor</label>
                <select name="losing_pitcher_id" id="losing_pitcher_id">
                    <option value="">— Seleccionar —</option>
                    <optgroup label="{{ sched.home_name }}">
                        {% for p in home_pitchers %}
                        <option value="{{ p.id }}" data-team="home" {{ 'selected' if game and game.losing_pitcher_id == p.id else '' }}>{{ p.name }}</option>
                        {% endfor %}
                    </optgroup>
                    <optgroup label="{{ sched.away_name }}">
                        {% for p in away_pitchers %}
                        <option value="{{ p.id }}" data-team="away" {{ 'selected' if game and game.losing_pitcher_id == p.id else '' }}>{{ p.name }}</option>
                        {% endfor %}
                    </optgroup>
                </select>
            </div>
            <div class="field">
                <label>Salvamento</label>
                <select name="save_pitcher_id" id="save_pitcher_id">
                    <option value="">— Ninguno —</option>
                    <optgroup label="{{ sched.home_name }}">
                        {% for p in home_pitchers %}
                        <option value="{{ p.id }}" data-team="home" {{ 'selected' if game and game.save_pitcher_id == p.id else '' }}>{{ p.name }}</option>
                        {% endfor %}
                    </optgroup>
                    <optgroup label="{{ sched.away_name }}">
                        {% for p in away_pitchers %}
                        <option value="{{ p.id }}" data-team="away" {{ 'selected' if game and game.save_pitcher_id == p.id else '' }}>{{ p.name }}</option>
                        {% endfor %}
                    </optgroup>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="field">
                <label>Fecha</label>
                <input type="date" name="date" value="{{ game.date if game else '' }}">
            </div>
            <div class="field">
                <label>Notas</label>
                <input type="text" name="notes" value="{{ game.notes if game else '' }}" placeholder="Extra innings, highlights...">
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-play" style="margin-top:1rem; padding: 0.6rem 2rem; font-size: 1rem;">
        {{ 'Actualizar' if game else 'Guardar' }} Resultado
    </button>
</form>

<script>
(function() {
    const homeRuns = document.getElementById('home_runs');
    const awayRuns = document.getElementById('away_runs');
    const wpSelect = document.getElementById('winning_pitcher_id');
    const lpSelect = document.getElementById('losing_pitcher_id');
    const svSelect = document.getElementById('save_pitcher_id');
    const hint = document.getElementById('pitcher-hint');

    function filterPitchers() {
        const hr = parseInt(homeRuns.value);
        const ar = parseInt(awayRuns.value);

        if (isNaN(hr) || isNaN(ar) || hr === ar) {
            setAllEnabled(wpSelect);
            setAllEnabled(lpSelect);
            setAllEnabled(svSelect);
            hint.style.display = 'none';
            return;
        }

        const winTeam = hr > ar ? 'home' : 'away';
        const loseTeam = hr > ar ? 'away' : 'home';
        const winName = hr > ar ? '{{ sched.home_name }}' : '{{ sched.away_name }}';
        const loseName = hr > ar ? '{{ sched.away_name }}' : '{{ sched.home_name }}';

        filterSelect(wpSelect, winTeam);
        filterSelect(lpSelect, loseTeam);
        filterSelect(svSelect, winTeam);

        hint.textContent = 'PG/SV: ' + winName + ' — PP: ' + loseName;
        hint.style.display = 'block';
    }

    function filterSelect(select, allowedTeam) {
        const options = select.querySelectorAll('option[data-team]');
        let selectedDisabled = false;

        options.forEach(function(opt) {
            if (opt.dataset.team === allowedTeam) {
                opt.disabled = false;
                opt.style.display = '';
            } else {
                opt.disabled = true;
                opt.style.display = 'none';
                if (opt.selected) selectedDisabled = true;
            }
        });

        if (selectedDisabled) select.value = '';
    }

    function setAllEnabled(select) {
        select.querySelectorAll('option[data-team]').forEach(function(opt) {
            opt.disabled = false;
            opt.style.display = '';
        });
    }

    homeRuns.addEventListener('input', filterPitchers);
    awayRuns.addEventListener('input', filterPitchers);

    // Run on load for edit mode
    filterPitchers();
})();
</script>
{% endblock %}
